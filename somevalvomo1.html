<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somejulkaisujen Valvomo</title>
    
    <script src="auth.js"></script> 
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #1e293b; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; }
        .julkaisu-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .meta-info { font-size: 0.85em; color: #64748b; margin-bottom: 15px; display: flex; gap: 15px; }
        .kuva-esikatselu { width: 100%; height: 350px; border-radius: 6px; margin-bottom: 15px; display: block; background: #e2e8f0; border: none; }
        .teksti-alue { width: 100%; height: 120px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1em; resize: vertical; box-sizing: border-box; margin-bottom: 15px; }
        
        /* Tyyli uudelle valintalaatikolle */
        .valinta-alue { margin-bottom: 15px; }
        .valinta-kentta { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95em; cursor: pointer; background-color: white; }
        
        .nappi-ryhma { display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 1em; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-hyvaksy { background-color: #10b981; color: white; }
        .btn-hyvaksy:hover { background-color: #059669; }
        .btn-pika { background-color: #3b82f6; color: white; }
        .btn-pika:hover { background-color: #2563eb; }
        .btn-hylkaa { background-color: #ef4444; color: white; }
        .btn-hylkaa:hover { background-color: #dc2626; }
        .tyhja-tila { text-align: center; padding: 40px; color: #64748b; background: white; border-radius: 8px; border: 1px dashed #cbd5e1; }
        .ilmoitus { padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-weight: bold; }
        .ilmoitus.success { background-color: #d1fae5; color: #065f46; display: block; }
        .ilmoitus.error { background-color: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>SolOne - Somejulkaisujen Valvomo</h1>
    <div id="ilmoitus-alue" class="ilmoitus"></div>
    <div id="julkaisut-lista">Ladataan odottavia julkaisuja...</div>
</div>

<script>
   // Funktio Maken skenaarion herättämiseen Webhookilla
    function kaynnistaMakeSkenaario() {
        const webhookUrl = 'https://hook.eu1.make.com/19dyks73yrgq8t3qbo3idoxt8p4i8t66'; 

        alert('Käynnistetään julkaisuskenaario...');

        fetch(webhookUrl, { mode: 'no-cors' })
        .then(() => {
            alert('Onnistui! Skenaario käynnistetty.');
        })
        .catch(error => {
            console.error('Virhe:', error);
            alert('Yhteysvirhe Makeen.');
        });
    }

    // Palautetaan urli ja avain suoraan, jos ne ovat olemassa
    function haeSupabaseAsiakas() {
        if (typeof SUPABASE_URL === 'undefined' || typeof ANON_KEY === 'undefined') {
            return null;
        }
        return { url: SUPABASE_URL, key: ANON_KEY };
    }

    async function haeOdottavatJulkaisut() {
        const listaElementti = document.getElementById('julkaisut-lista');
        const db = haeSupabaseAsiakas();
        
        try {
            if (!db || !db.url || !db.key) {
                throw new Error("Odotetaan kirjautumisen alustusta...");
            }

            const response = await fetch(`${db.url}/rest/v1/somepostaukset?status=eq.odotetaan&order=luotu_aika.asc`, {
                method: 'GET',
                headers: {
                    'apikey': db.key,
                    'Authorization': `Bearer ${localStorage.getItem('supabase_token')}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.message || "Tietojen haku epäonnistui");
            }

            const data = await response.json();
            console.log("Valvomon saama vastaus tietokannasta:", data);

            if (!data || data.length === 0) {
                listaElementti.innerHTML = '<div class="tyhja-tila">Ei odottavia somejulkaisuja. Kaikki valmiina!</div>';
                return;
            }

            listaElementti.innerHTML = '';
            
            data.forEach(julkaisu => {
                const pvm = julkaisu.luotu_aika ? new Date(julkaisu.luotu_aika).toLocaleString('fi-FI') : '-';
                const card = document.createElement('div');
                card.className = 'julkaisu-card';
                card.id = 'card-' + julkaisu.id;
                
                // Otetaan nykyinen arvo talteen sellaisenaan vertailuja varten
                const nykyinenAlusta = julkaisu.alusta || 'Molemmat';
                
                let htmlSisalto = '';
                htmlSisalto += '<div class="meta-info">';
                htmlSisalto += '<span><strong>Luotu:</strong> ' + pvm + '</span>';
                htmlSisalto += '<span><strong>Alkuperäinen kohde:</strong> ' + nykyinenAlusta + '</span>';
                htmlSisalto += '</div>';
                
                if (julkaisu.kuva_url) {
                    let toimivaKuvaUrl = julkaisu.kuva_url;
                    
                    if (toimivaKuvaUrl.includes('uc?id=')) {
                        const kuvaId = toimivaKuvaUrl.split('id=')[1].split('&')[0];
                        toimivaKuvaUrl = 'https://drive.google.com/file/d/' + kuvaId + '/preview';
                    } else {
                        toimivaKuvaUrl = toimivaKuvaUrl.replace('export=download', 'preview');
                    }
                    
                    htmlSisalto += '<iframe src="' + toimivaKuvaUrl + '" class="kuva-esikatselu" style="width:100%; height:350px; border:none; margin-bottom:15px;" allow="autoplay"></iframe>';
                }
                
                htmlSisalto += '<label style="font-weight:bold; display:block; margin-bottom:5px;">Julkaisuteksti:</label>';
                htmlSisalto += '<textarea id="teksti-' + julkaisu.id + '" class="teksti-alue">' + (julkaisu.julkaisuteksti || '') + '</textarea>';
                
                // Valintalaatikko, jossa mukana myös testivaihtoehdot
                htmlSisalto += '<div class="valinta-alue">';
                htmlSisalto += '<label style="font-weight:bold; margin-right:10px;">Julkaisukanava:</label>';
                htmlSisalto += '<select id="alusta-' + julkaisu.id + '" class="valinta-kentta">';
                
                // Tuotantovaihtoehdot
                htmlSisalto += '<option value="Molemmat"' + (nykyinenAlusta === 'Molemmat' ? ' selected' : '') + '>Molemmat (FB & IG)</option>';
                htmlSisalto += '<option value="facebook"' + (nykyinenAlusta === 'facebook' ? ' selected' : '') + '>Vain Facebook</option>';
                htmlSisalto += '<option value="instagram"' + (nykyinenAlusta === 'instagram' ? ' selected' : '') + '>Vain Instagram</option>';
                
                // Testivaihtoehdot (arvoissa mukana sana 'testi', jolloin Maken suodatin blokkaa ne)
                htmlSisalto += '<option value="Molemmat testi"' + (nykyinenAlusta === 'Molemmat testi' ? ' selected' : '') + '>🛠️ Molemmat (TESTI)</option>';
                htmlSisalto += '<option value="facebook testi"' + (nykyinenAlusta === 'facebook testi' ? ' selected' : '') + '>🛠️ Vain Facebook (TESTI)</option>';
                htmlSisalto += '<option value="instagram testi"' + (nykyinenAlusta === 'instagram testi' ? ' selected' : '') + '>🛠️ Vain Instagram (TESTI)</option>';
                
                htmlSisalto += '</select>';
                htmlSisalto += '</div>';
                
                htmlSisalto += '<div class="nappi-ryhma">';
                htmlSisalto += '<button class="btn-hyvaksy" onclick="paivitaStatus(\'' + julkaisu.id + '\', \'hyvaksytty\')">Hyväksy julkaistavaksi</button>';
                htmlSisalto += '<button class="btn-pika" onclick="paivitaStatus(\'' + julkaisu.id + '\', \'hyvaksytty\'); setTimeout(kaynnistaMakeSkenaario, 1000);">🚀 Julkaise välittömästi</button>';
                htmlSisalto += '<button class="btn-hylkaa" onclick="paivitaStatus(\'' + julkaisu.id + '\', \'hylatty\')">Hylkää</button>';
                htmlSisalto += '</div>';
                
                card.innerHTML = htmlSisalto;
                listaElementti.appendChild(card);
            });
            
        } catch (error) {
            console.error("Valvomo-virhe:", error);
            const alue = document.getElementById('ilmoitus-alue');
            alue.textContent = 'Virhe ladattaessa tietoja: ' + error.message;
            alue.className = 'ilmoitus error';
            alue.style.display = 'block';
            listaElementti.innerHTML = '<div class="tyhja-tila">Tietojen haku epäonnistui. Varmista kirjautminen.</div>';
        }
    }

    async function paivitaStatus(id, uusiStatus) {
        const muokattuTeksti = document.getElementById('teksti-' + id).value;
        const valittuAlusta = document.getElementById('alusta-' + id).value;
        const db = haeSupabaseAsiakas();
        
        try {
            if (!db || !db.url || !db.key) throw new Error("Tietokantayhteys katkesi.");

            const response = await fetch(`${db.url}/rest/v1/somepostaukset?id=eq.${id}`, {
                method: 'PATCH',
                headers: {
                    'apikey': db.key,
                    'Authorization': `Bearer ${localStorage.getItem('supabase_token')}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    status: uusiStatus,
                    julkaisuteksti: muokattuTeksti,
                    alusta: valittuAlusta // Lähettää valitun arvon (esim. 'Molemmat testi') kantaan
                })
            });

            if (!response.ok) throw new Error("Tilan päivitys epäonnistui palvelimella.");
            
            const alue = document.getElementById('ilmoitus-alue');
            alue.textContent = uusiStatus === 'hyvaksytty' ? 'Julkaisu hyväksytty jonoon!' : 'Julkaisu hylätty.';
            alue.className = 'ilmoitus success';
            alue.style.display = 'block';
            setTimeout(() => { alue.style.display = 'none'; }, 5000);
            
            const card = document.getElementById('card-' + id);
            if (card) card.remove();
            
            if (document.querySelectorAll('.julkaisu-card').length === 0) {
                document.getElementById('julkaisut-lista').innerHTML = '<div class="tyhja-tila">Ei odottavia somejulkaisuja. Kaikki valmiina!</div>';
            }
        } catch (error) {
            alert('Toiminto epäonnistui: ' + error.message);
        }
    }

    function kaynnistaValvomo() {
        if (typeof SUPABASE_URL !== 'undefined' && typeof ANON_KEY !== 'undefined') {
            console.log("Valvomo alustettu auth.js-muuttujilla. Haetaan julkaisut...");
            haeOdottavatJulkaisut();
        } else {
            console.log("Odotetaan auth.js alustusta...");
            setTimeout(kaynnistaValvomo, 300);
        }
    }

    window.addEventListener('load', kaynnistaValvomo);
</script>
</body>
</html>
